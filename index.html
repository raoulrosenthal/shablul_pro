<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swim Booker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Swimmer_icon.svg/512px-Swimmer_icon.svg.png">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #f2f2f7; color: #1c1c1e; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        select, input[type="time"] { width: 100%; padding: 10px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .toggle-container { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding: 10px 0; border-top: 1px solid #e5e5ea; border-bottom: 1px solid #e5e5ea; }
        .switch { position: relative; display: inline-block; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #d1d1d6; transition: .4s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(20px); }
        button { width: 100%; background-color: #007aff; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; }
        button:active { background-color: #005bb5; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ShablulPro 🐌</h2>

    <label for="userSelect">User</label>
    <select id="userSelect">
        <option value="raoul">Raoul</option>
        <option value="debby">Debby</option>
        <option value="dan">Dan</option>
    </select>

    <div class="toggle-container">
        <label for="isActive" style="margin: 0;">Active (Vacation Mode)</label>
        <label class="switch">
            <input type="checkbox" id="isActive" checked>
            <span class="slider"></span>
        </label>
    </div>

    <label for="daySelect">Day of the Week</label>
    <select id="daySelect">
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
        <option value="Sunday">Sunday</option>
    </select>

    <label for="timeSelect">Time</label>
    <input type="time" id="timeSelect" value="06:15">

    <button onclick="submitSchedule()">Save Schedule</button>

    <div id="status"></div>
</div>

<script>
    // YOU WILL PASTE YOUR API GATEWAY URL HERE
    const API_URL = "https://ym1b9m0605.execute-api.us-east-1.amazonaws.com/prod/schedule"; 

    async function submitSchedule() {
        const userId = document.getElementById('userSelect').value;
        const isActive = document.getElementById('isActive').checked;
        const day = document.getElementById('daySelect').value;
        const time = document.getElementById('timeSelect').value;
        const statusDiv = document.getElementById('status');

        statusDiv.innerText = "Saving...";
        statusDiv.style.color = "#8e8e93";

        const payload = {
            user_id: userId,
            is_active: isActive,
            schedules: [{ day_of_week: day, time: time }]
        };

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                statusDiv.innerText = "✅ Saved Successfully!";
                statusDiv.style.color = "#34c759";
            } else {
                throw new Error("Server rejected request");
            }
        } catch (error) {
            statusDiv.innerText = "❌ Error saving data.";
            statusDiv.style.color = "#ff3b30";
            console.error(error);
        }
    }
</script>

</body>
</html>
